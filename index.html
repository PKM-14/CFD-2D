<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CFD Visualiser</title>
  <style>
    body { margin:0; overflow:hidden; background:black; font-family:sans-serif; }
    canvas { display:block; }
    #ui {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      background:rgba(0,0,0,0.5);
      padding:10px;
      border-radius:5px;
      font-size:14px;
      line-height:1.5;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui"></div>
  <script src="script.js"></script>
</body>
</html>
